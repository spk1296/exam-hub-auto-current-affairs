name: Update Current Affairs

on:
  schedule:
    # Runs every day at 01:00 UTC (06:30 AM IST)
    - cron: "0 1 * * *"
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: read

jobs:
  update-current-affairs:
    name: Fetch, Process and Upload Current Affairs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run current affairs automation
        env:
          NEWSDATA_API_KEY_1: ${{ secrets.NEWSDATA_API_KEY_1 }}
          NEWSDATA_API_KEY_2: ${{ secrets.NEWSDATA_API_KEY_2 }}
          NEWSDATA_API_KEY_3: ${{ secrets.NEWSDATA_API_KEY_3 }}
          NEWSDATA_API_KEY_4: ${{ secrets.NEWSDATA_API_KEY_4 }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          THENEWS_API_KEY: ${{ secrets.THENEWS_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        run: python main.py
